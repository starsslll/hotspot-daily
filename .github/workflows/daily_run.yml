name: Daily Hotspot Report
on:
  schedule:
    # 北京时间每天 8:30（UTC 0:30）；避开整点高峰，延迟更小
    # 注意：GitHub 定时任务仅在默认分支（main/master）上触发
    - cron: '30 2 * * *'
  workflow_dispatch:       # 允许手动触发，方便调试

permissions:
  contents: write          # 关键：允许将今日数据commit回仓库

concurrency:
  group: hotspot-crawler   # 防止并发冲突
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 拉取完整历史，便于读取昨日文件

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pwd
          ls -la
          pip install -r requirements.txt

      - name: Run crawler and analysis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}   # 多个邮箱用英文逗号隔开，如 a@q.com,b@q.com
        run: python main.py

      - name: Commit and push historical data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Update hotspot data $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push
